<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #eee; border-radius: 10px; }
        .header { text-align: center; margin-bottom: 20px; }
        .logo { color: #0f172a; font-size: 24px; font-weight: bold; text-decoration: none; }
        .content { background: #f9f9f9; padding: 20px; border-radius: 5px; }
        .btn { display: inline-block; padding: 10px 20px; background-color: #0f172a; color: #fff; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="{{ site_url }}" class="logo">The Routeless</a>
        </div>
        <p>Hi {{ recipient_name }},</p>
        <p>You have received a new message regarding <strong>{{ experience.title }}</strong>.</p>
        
        <div class="content">
            <p><strong>{{ sender_name }}</strong> says:</p>
            <p style="font-style: italic;">"{{ message_text }}"</p>
        </div>
        
        <div style="text-align: center;">
            <a href="{{ site_url }}{% url 'conversation_detail' experience.id %}" class="btn">Reply to Message</a>
        </div>
        
        <p style="margin-top: 30px; font-size: 12px; color: #777;">
            Thank you for using The Routeless.<br>
            If you have any questions, please contact support.
        </p>
    </div>
</body>
</html>
