<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #eee; border-radius: 10px; }
        .header { text-align: center; margin-bottom: 20px; }
        .logo { color: #2b6777; font-size: 24px; font-weight: bold; text-decoration: none; }
        .content { background: #f0f7f4; padding: 20px; border-radius: 5px; border-left: 4px solid #52a447; }
        .btn { display: inline-block; padding: 10px 20px; background-color: #2b6777; color: #fff; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="{{ site_url }}" class="logo">THEROUTELESS</a>
        </div>
        <p>Hi {{ host_name }},</p>
        <p>Great news! You just received a new review for <strong>{{ experience.title }}</strong>.</p>
        
        <div class="content">
            <p><strong>{{ reviewer_name }}</strong> rated your experience <strong>{{ rating }}/5</strong> stars.</p>
            <p style="font-style: italic;">"{{ comment }}"</p>
        </div>
        
        <div style="text-align: center;">
            <a href="{{ site_url }}{% url 'host_dashboard' %}" class="btn">View Dashboard</a>
        </div>
        
        <p style="margin-top: 30px; font-size: 12px; color: #777;">
            Keep up the great work hosting on THEROUTELESS!
        </p>
    </div>
</body>
</html>
