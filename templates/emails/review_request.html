<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #eee; border-radius: 10px; }
        .header { text-align: center; margin-bottom: 20px; }
        .logo { color: #2b6777; font-size: 24px; font-weight: bold; text-decoration: none; }
        .content { text-align: center; background: #f9f9f9; padding: 30px; border-radius: 5px; }
        .btn { display: inline-block; padding: 12px 24px; background-color: #f2a900; color: #fff; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="{{ site_url }}" class="logo">Safar</a>
        </div>
        <p>Hi {{ traveler_name }},</p>
        <p>We hope you had an amazing experience at <strong>{{ experience.title }}</strong>!</p>
        
        <div class="content">
            <h2 style="color: #2b6777;">Share your experience</h2>
            <p>Your feedback helps other travelers and supports your host. Please take a moment to rate your trip and leave a review.</p>
            <a href="{{ site_url }}{% url 'leave_review' booking.id %}" class="btn">Leave a Review</a>
        </div>
        
        <p style="margin-top: 30px; font-size: 12px; color: #777;">
            Thank you for exploring with Safar.
        </p>
    </div>
</body>
</html>
