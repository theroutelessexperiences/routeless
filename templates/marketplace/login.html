{% extends "base.html" %}

{% block title %}Log In - Routeless{% endblock %}

{% block content %}
<div class="container" style="margin-top: 100px; min-height: 80vh;">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card experience-card p-4 p-md-5 mt-5">
                <h2 class="fw-bold mb-4 text-center" style="color: var(--primary-color);">Welcome Back</h2>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary w-100 py-2 mt-3">Log In</button>
                </form>
                <div class="mt-4 text-center">
                    <p class="mb-0">Don't have an account? <a href="{% url 'account_signup' %}"
                            class="text-decoration-none fw-bold" style="color: var(--accent-color);">Sign up</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
