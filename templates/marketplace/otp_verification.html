{% extends "base.html" %}

{% block title %}Verify Code - THEROUTELESS{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow-sm border-0" style="max-width: 500px; width: 100%;">
        <div class="card-body p-5 text-center">
            <div class="mb-4">
                <i class="bi bi-shield-check text-success" style="font-size: 3rem;"></i>
                <h2 class="fw-bold mt-2">Verify Your Identity</h2>
                <p class="text-muted">We've sent a 6-digit code to your email. Enter it below.</p>
            </div>
            
            <form method="post" action="{% url 'otp_verify' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <input type="text" name="otp" id="otp" class="form-control form-control-lg text-center fw-bold" required maxlength="6" placeholder="0 0 0 0 0 0" style="letter-spacing: 0.5rem; font-size: 1.5rem;">
                </div>
                <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 mt-2">Verify Code</button>
            </form>
            
            <div class="mt-4">
                <p class="text-muted small mb-1">Didn't receive the code?</p>
                <a href="{% url 'otp_login' %}" class="text-decoration-none">Request a new code</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
