{% extends "base.html" %}

{% block content %}
<div class="container py-5 my-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-5 text-center">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-4 p-md-5">
                    <i class="bi bi-shield-check text-success" style="font-size: 3rem;"></i>
                    <h2 class="auth-title mt-3 mb-4">Password Reset Complete</h2>
                    <p class="text-muted">Your password has been successfully set. You may go ahead and log in now.</p>
                    <a href="{% url 'account_login' %}" class="btn btn-primary rounded-pill fw-bold px-4 mt-3">Log In</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
