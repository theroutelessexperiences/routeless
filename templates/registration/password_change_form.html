{% extends "base.html" %}

{% block content %}
<div class="container py-5 my-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-5">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-4 p-md-5">
                    <h2 class="auth-title mb-4">Change Password</h2>

                    <form method="post">
                        {% csrf_token %}
                        {% for field in form %}
                        <div class="mb-3">
                            <label for="{{ field.id_for_label }}"
                                class="form-label text-muted small fw-semibold text-uppercase">{{ field.label }}</label>
                            <input type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}"
                                id="{{ field.id_for_label }}"
                                class="form-control {% if field.errors %}is-invalid{% endif %}" required>
                            {% if field.help_text %}
                            <div class="form-text">{{ field.help_text }}</div>
                            {% endif %}
                            {% if field.errors %}
                            <div class="invalid-feedback">{{ field.errors|join:", " }}</div>
                            {% endif %}
                        </div>
                        {% endfor %}

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold">Change
                                Password</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
