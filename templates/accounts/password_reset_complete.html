{% extends "base.html" %}

{% block title %}Password Reset Complete - The Routeless{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow-sm border-0 text-center" style="max-width: 500px; width: 100%;">
        <div class="card-body p-5">
            <div class="mb-4">
                <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
            </div>
            <h2 class="fw-bold">Password Reset Complete</h2>
            <p class="text-muted mt-2">Your password has been set. You may go ahead and log in now.</p>
            <a href="{% url 'account_login' %}" class="btn btn-primary rounded-pill mt-4 px-5 py-2">Log In</a>
        </div>
    </div>
</div>
{% endblock %}
