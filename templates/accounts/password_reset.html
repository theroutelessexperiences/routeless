{% extends "base.html" %}

{% block title %}Reset Password - Routeless{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow-sm border-0" style="max-width: 500px; width: 100%;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <i class="bi bi-key" style="font-size: 3rem; color: var(--primary-color);"></i>
                <h2 class="fw-bold mt-2">Reset Password</h2>
                <p class="text-muted">Enter your email address and we'll send you a link to reset your password.</p>
            </div>
            
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 mt-3">Send Reset Link</button>
            </form>
            
            <div class="text-center mt-4">
                <a href="{% url 'account_login' %}" class="text-decoration-none">Back to Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
