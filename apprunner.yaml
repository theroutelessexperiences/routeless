version: 1.0
runtime: python311

build:
  commands:
    build:
      - pip3 install -r requirements.txt
      - python3 manage.py collectstatic --no-input
      - python3 manage.py migrate

run:
  runtime-version: 3.11
  pre-run:
    - pip3 install -r requirements.txt
  command: python3 -m daphne -b 0.0.0.0 -p 8080 safar_hq.asgi:application
  network:
    port: 8080
